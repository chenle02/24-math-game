<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24 Math Challenge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a0033, #000);
      color: white;
      text-align: center;
    }

    /* TITLE */
    .title {
      font-size: 40px;
      font-weight: bold;
      margin-top: 20px;
    }

    /* BUTTONS */
    .menu button {
      margin: 5px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .easy { background: #1e8e3e; color: white; }
    .medium { background: #d18b00; }
    .hard { background: #c0392b; color: white; }
    .extreme { background: #6c3483; color: white; }

    /* GAME */
    .game { margin-top: 20px; }
    .numbers { font-size: 30px; margin: 15px; }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    .submit {
      margin-top: 10px;
      padding: 12px;
      background: #00c853;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .result { margin-top: 15px; font-size: 18px; }
    .score { margin-top: 10px; color: #aaa; }
  </style>
</head>
<body>
  <div class="title">🧠 24 MATH CHALLENGE</div>

  <h3>Select Difficulty</h3>

  <div class="menu">
    <button class="easy" onclick="setLevel('easy')">Easy</button>
    <button class="medium" onclick="setLevel('medium')">Medium</button>
    <button class="hard" onclick="setLevel('hard')">Hard</button>
    <button class="extreme" onclick="setLevel('extreme')">Extreme</button>
  </div>

  <div class="game">
    <h2 id="levelText">Level: EASY</h2>
    <div class="numbers" id="numbers"></div>
    <input id="answer" placeholder="Example: 8*3" />
    <br><br>
    <button class="submit" onclick="check()">SUBMIT</button>
    <div class="result" id="result"></div>
    <div class="score" id="score">Score: 0</div>
  </div>

  <script>
    let level = "easy";
    let nums = [];
    let score = 0;

    function setLevel(lvl) {
      level = lvl;
      document.getElementById("levelText").innerText = "Level: " + lvl.toUpperCase();
      generate();
    }

    function generate() {
      nums = [];
      let max = 9;
      if (level === "medium") max = 15;
      if (level === "hard") max = 20;
      if (level === "extreme") max = 30;

      for (let i = 0; i < 4; i++) {
        nums.push(Math.floor(Math.random() * max) + 1);
      }

      document.getElementById("numbers").innerText = nums.join(" ");
      document.getElementById("answer").value = "";
      document.getElementById("result").innerText = "";
    }

    function safeEval(expr) {
      try {
        return Function("return " + expr)();
      } catch {
        return null;
      }
    }

    function check() {
      let expr = document.getElementById("answer").value;

      if (level === "easy" && expr.includes("(")) {
        document.getElementById("result").innerText = "❌ Easy mode: no parentheses!";
        return;
      }

      let result = safeEval(expr);

      if (result === null) {
        document.getElementById("result").innerText = "❌ Invalid input";
        return;
      }

      if (result === 24) {
        score += 10;
        document.getElementById("result").innerText = "✅ Correct! +10";
        document.getElementById("score").innerText = "Score: " + score;
        generate();
      } else {
        document.getElementById("result").innerText = "❌ Try again!";
      }
    }

    generate();
  </script>
</body>
</html>
